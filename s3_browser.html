<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S3 Bucket — goodgame-prod</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Unbounded:wght@400;700;900&display=swap');

:root {
  --bg: #0a0a0f;
  --surface: #111118;
  --surface2: #1a1a24;
  --border: #2a2a3a;
  --accent: #7c3aed;
  --accent2: #a855f7;
  --green: #22c55e;
  --red: #ef4444;
  --yellow: #f59e0b;
  --blue: #3b82f6;
  --text: #e2e8f0;
  --muted: #64748b;
  --dim: #334155;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  min-height: 100vh;
  padding: 0;
}

/* Шапка */
.header {
  background: linear-gradient(135deg, #1a0a2e 0%, #0f0f1a 60%, #0a0a0f 100%);
  border-bottom: 1px solid var(--border);
  padding: 24px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(10px);
}
.header-left { display: flex; align-items: center; gap: 14px; }
.bucket-icon {
  width: 42px; height: 42px; border-radius: 10px;
  background: linear-gradient(135deg, var(--accent), #5b21b6);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}
.bucket-name { font-family: 'Unbounded', sans-serif; font-size: 16px; font-weight: 700; }
.bucket-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
.header-stats { display: flex; gap: 24px; }
.stat { text-align: right; }
.stat-val { font-size: 18px; font-weight: 700; color: var(--accent2); }
.stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

/* Контролы */
.controls {
  padding: 16px 32px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
}
.search-wrap { position: relative; flex: 1; min-width: 200px; }
.search-wrap input {
  width: 100%; background: var(--bg);
  border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); font-family: inherit; font-size: 13px;
  padding: 9px 12px 9px 36px; outline: none;
  transition: border-color .15s;
}
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap input::placeholder { color: var(--muted); }
.search-ico {
  position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
  color: var(--muted); pointer-events: none;
}
.sort-btns { display: flex; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.sort-btn {
  background: none; border: none; color: var(--muted); font-family: inherit;
  font-size: 11px; font-weight: 600; padding: 9px 14px; cursor: pointer;
  transition: all .12s; text-transform: uppercase; letter-spacing: .5px;
  display: flex; align-items: center; gap: 5px;
}
.sort-btn:not(:last-child) { border-right: 1px solid var(--border); }
.sort-btn.active { background: rgba(124,58,237,0.2); color: var(--accent2); }
.sort-btn:hover:not(.active) { color: var(--text); background: rgba(255,255,255,.03); }
.view-btns { display: flex; gap: 2px; }
.view-btn {
  background: none; border: 1px solid var(--border); border-radius: 7px;
  color: var(--muted); cursor: pointer; width: 34px; height: 34px;
  display: flex; align-items: center; justify-content: center;
  transition: all .12s;
}
.view-btn.active { border-color: var(--accent); color: var(--accent2); background: rgba(124,58,237,.15); }
.filter-tags { display: flex; gap: 6px; flex-wrap: wrap; }
.tag {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 6px; padding: 5px 10px; font-size: 11px; color: var(--muted);
  cursor: pointer; transition: all .12s; display: flex; align-items: center; gap: 5px;
}
.tag.active { border-color: var(--accent); color: var(--accent2); background: rgba(124,58,237,.15); }
.tag:hover:not(.active) { color: var(--text); border-color: #4a4a5a; }
.tag-dot { width: 6px; height: 6px; border-radius: 50%; }
.counter { font-size: 12px; color: var(--muted); white-space: nowrap; margin-left: auto; }

/* Дерево папок + контент */
.layout { display: flex; height: calc(100vh - 130px); }
.sidebar-tree {
  width: 220px; flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow-y: auto; padding: 12px 0;
}
.tree-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 16px; cursor: pointer; font-size: 12px; color: var(--muted);
  transition: all .1s; user-select: none;
}
.tree-item:hover { background: rgba(255,255,255,.03); color: var(--text); }
.tree-item.active { background: rgba(124,58,237,.15); color: var(--accent2); }
.tree-icon { font-size: 14px; flex-shrink: 0; }
.tree-count {
  margin-left: auto; background: var(--dim); border-radius: 10px;
  padding: 1px 7px; font-size: 10px; color: var(--muted);
}

/* Основной контент */
.main { flex: 1; overflow-y: auto; padding: 20px 24px; }

/* Таблица */
.file-table { width: 100%; border-collapse: collapse; }
.file-table th {
  padding: 10px 14px; text-align: left; font-size: 10px; font-weight: 700;
  color: var(--muted); text-transform: uppercase; letter-spacing: .8px;
  border-bottom: 1px solid var(--border); position: sticky; top: 0;
  background: var(--bg); z-index: 1;
}
.file-table td { padding: 9px 14px; border-bottom: 1px solid #1a1a24; font-size: 12px; }
.file-table tr:hover td { background: rgba(255,255,255,.02); }
.file-key { color: var(--text); word-break: break-all; max-width: 500px; font-weight: 500; }
.file-key .folder-part { color: var(--muted); }
.file-key .file-name { color: var(--text); }
.file-size { color: var(--muted); white-space: nowrap; text-align: right; }
.file-date { color: var(--muted); white-space: nowrap; font-size: 11px; }
.file-type { white-space: nowrap; }
.type-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 7px; border-radius: 5px; font-size: 10px; font-weight: 700;
}

/* Grid view */
.file-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px;
}
.grid-item {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px; cursor: default;
  transition: border-color .15s;
}
.grid-item:hover { border-color: #4a4a6a; }
.grid-icon { font-size: 28px; margin-bottom: 10px; }
.grid-name { font-size: 11px; color: var(--text); word-break: break-all; font-weight: 600; margin-bottom: 4px; }
.grid-path { font-size: 10px; color: var(--muted); word-break: break-all; margin-bottom: 8px; }
.grid-meta { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); }

.empty { text-align: center; padding: 60px; color: var(--muted); }
.empty-ico { font-size: 48px; margin-bottom: 12px; opacity: .3; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 3px; }
</style>
</head>

// Утилиты
function fmtSize(b){
  if(!b) return '0 B';
  if(b<1024) return b+' B';
  if(b<1048576) return (b/1024).toFixed(1)+' KB';
  if(b<1073741824) return (b/1048576).toFixed(1)+' MB';
  return (b/1073741824).toFixed(2)+' GB';
}
function getExt(key){
  var name=key.split('/').pop();
  return name.includes('.')?name.split('.').pop().toLowerCase():'';
}
function getFileIcon(key){
  var ext=getExt(key);
  if(['jpg','jpeg','png','gif','webp','svg'].includes(ext)) return '🖼️';
  if(['json'].includes(ext)) return '📋';
  if(['txt','log','md'].includes(ext)) return '📄';
  if(['zip','gz','tar'].includes(ext)) return '📦';
  if(['pdf'].includes(ext)) return '📕';
  if(['mp3','wav','ogg'].includes(ext)) return '🎵';
  if(['mp4','webm','mov'].includes(ext)) return '🎬';
  return '📁';
}
function getTypeColor(key){
  var ext=getExt(key);
  if(['jpg','jpeg','png','gif','webp','svg'].includes(ext)) return {bg:'rgba(34,197,94,.12)',c:'#22c55e'};
  if(['json'].includes(ext)) return {bg:'rgba(251,191,36,.12)',c:'#fbbf24'};
  if(['zip','gz','tar'].includes(ext)) return {bg:'rgba(239,68,68,.12)',c:'#ef4444'};
  if(['pdf'].includes(ext)) return {bg:'rgba(239,68,68,.12)',c:'#ef4444'};
  if(['mp3','wav','ogg'].includes(ext)) return {bg:'rgba(168,85,247,.12)',c:'#a855f7'};
  if(['mp4','webm','mov'].includes(ext)) return {bg:'rgba(168,85,247,.12)',c:'#a855f7'};
  if(['txt','log','md'].includes(ext)) return {bg:'rgba(148,163,184,.1)',c:'#94a3b8'};
  return {bg:'rgba(59,130,246,.12)',c:'#3b82f6'};
}

// Состояние
var sortKey='date', sortAsc=false, viewMode='table';
var activeFolder='all', query='';

// Папки
var folders={'all': FILES};
FILES.forEach(function(f){
  var parts=f.key.split('/');
  var top=parts.length>1?parts[0]:'(корень)';
  if(!folders[top]) folders[top]=[];
  folders[top].push(f);
});

// Стата
var totalSize=FILES.reduce(function(a,b){return a+b.size;},0);
document.getElementById('total-count').textContent=FILES.length.toLocaleString('ru');
document.getElementById('total-size').textContent=fmtSize(totalSize);

// Дерево
function buildTree(){
  var t=document.getElementById('tree');
  t.innerHTML='';
  var all=document.createElement('div');
  all.className='tree-item'+(activeFolder==='all'?' active':'');
  all.innerHTML='<span class="tree-icon">🪣</span><span>Все файлы</span><span class="tree-count">'+FILES.length+'</span>';
  all.addEventListener('click',function(){activeFolder='all';buildTree();render();});
  t.appendChild(all);

  Object.keys(folders).filter(function(k){return k!=='all';}).sort().forEach(function(folder){
    var item=document.createElement('div');
    item.className='tree-item'+(activeFolder===folder?' active':'');
    var icon=folder==='(корень)'?'📄':'📂';
    item.innerHTML='<span class="tree-icon">'+icon+'</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+folder+'</span><span class="tree-count">'+folders[folder].length+'</span>';
    item.addEventListener('click',function(){activeFolder=folder;buildTree();render();});
    t.appendChild(item);
  });
}

// Фильтр + сортировка
function getFiltered(){
  var src=activeFolder==='all'?FILES:(folders[activeFolder]||[]);
  var q=query.toLowerCase();
  if(q) src=src.filter(function(f){return f.key.toLowerCase().includes(q);});
  src=src.slice().sort(function(a,b){
    var va,vb;
    if(sortKey==='name'){va=a.key.toLowerCase();vb=b.key.toLowerCase();}
    else if(sortKey==='size'){va=a.size;vb=b.size;}
    else{va=a.date;vb=b.date;}
    if(va<vb) return sortAsc?-1:1;
    if(va>vb) return sortAsc?1:-1;
    return 0;
  });
  return src;
}

// Рендер
function render(){
  var files=getFiltered();
  var main=document.getElementById('main');
  document.getElementById('counter').textContent=files.length+' файлов';

  if(!files.length){
    main.innerHTML='<div class="empty"><div class="empty-ico">🔍</div><div>Ничего не найдено</div></div>';
    return;
  }

  if(viewMode==='table'){
    var html='<table class="file-table"><thead><tr>'+
      '<th>Файл</th><th>Тип</th><th style="text-align:right">Размер</th><th>Дата</th>'+
      '</tr></thead><tbody>';
    files.forEach(function(f){
      var parts=f.key.split('/');
      var name=parts.pop();
      var folder=parts.join('/');
      var ext=getExt(f.key)||'—';
      var tc=getTypeColor(f.key);
      var icon=getFileIcon(f.key);
      html+='<tr>'+
        '<td class="file-key">'+
          (folder?'<span class="folder-part">'+esc(folder)+'/</span>':'')+
          '<span class="file-name">'+icon+' '+esc(name)+'</span>'+
        '</td>'+
        '<td class="file-type"><span class="type-badge" style="background:'+tc.bg+';color:'+tc.c+'">'+esc(ext)+'</span></td>'+
        '<td class="file-size">'+fmtSize(f.size)+'</td>'+
        '<td class="file-date">'+f.date.slice(0,10)+'</td>'+
        '</tr>';
    });
    html+='</tbody></table>';
    main.innerHTML=html;
  } else {
    var div=document.createElement('div');
    div.className='file-grid';
    files.forEach(function(f){
      var parts=f.key.split('/');
      var name=parts.pop();
      var path=parts.join('/');
      var icon=getFileIcon(f.key);
      var item=document.createElement('div');
      item.className='grid-item';
      item.innerHTML='<div class="grid-icon">'+icon+'</div>'+
        '<div class="grid-name">'+esc(name)+'</div>'+
        (path?'<div class="grid-path">'+esc(path)+'/</div>':'')+
        '<div class="grid-meta"><span>'+fmtSize(f.size)+'</span><span>'+f.date.slice(0,10)+'</span></div>';
      div.appendChild(item);
    });
    main.innerHTML='';
    main.appendChild(div);
  }
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// События
document.getElementById('search').addEventListener('input',function(e){
  query=e.target.value.trim();render();
});

['name','date','size'].forEach(function(k){
  document.getElementById('sort-'+k).addEventListener('click',function(){
    if(sortKey===k){sortAsc=!sortAsc;}else{sortKey=k;sortAsc=k==='name';}
    ['name','date','size'].forEach(function(x){
      document.getElementById('sort-'+x).classList.toggle('active',sortKey===x);
      var d=document.getElementById('dir-'+x);
      d.textContent=sortKey===x?(sortAsc?'▲':'▼'):'▼';
    });
    render();
  });
});

document.getElementById('view-table').addEventListener('click',function(){
  viewMode='table';
  document.getElementById('view-table').classList.add('active');
  document.getElementById('view-grid').classList.remove('active');
  render();
});
document.getElementById('view-grid').addEventListener('click',function(){
  viewMode='grid';
  document.getElementById('view-grid').classList.add('active');
  document.getElementById('view-table').classList.remove('active');
  render();
});

buildTree();
render();
</script>
